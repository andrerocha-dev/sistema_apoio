{% extends 'base.html' %}

{% block title %}Cadastrar Prestador{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-end border border-secondary">
            <div class="card-body p-lg-5">
                <h2 class="card-title text-center fw-bold mb-4">Cadastrar Prestador</h2>
                <form method="post" novalidate class="highlight-blue prestador-create">
                    {% csrf_token %}

                    {% for field in form %}
                    <div class="form-floating mb-3">
                        {{ field }}
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {% for error in field.errors %}<div class="invalid-feedback d-block">{{ error }}</div>{% endfor %}
                    </div>
                    {% endfor %}

                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary btn-lg">Cadastrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
