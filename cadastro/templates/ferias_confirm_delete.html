{% extends 'base.html' %}
{% load static %}

{% block title %}Excluir Férias{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h5 class="card-title">Confirmar exclusão</h5>
    <p>Tem certeza que deseja excluir <strong>{{ object }}</strong>?</p>

    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Excluir</button>
        <a href="{% url 'ferias-list' %}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
