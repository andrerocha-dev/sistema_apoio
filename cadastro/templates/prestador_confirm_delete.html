{% extends 'base.html' %}

{% block title %}Confirmar Exclusão{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow border-0">
      <div class="card-body p-4 text-center">
        <h3 class="mb-3">Confirmar exclusão</h3>
        <p class="text-muted">Você tem certeza que deseja excluir o prestador <strong>{{ object.nome }}</strong>?</p>

        <div class="d-flex justify-content-center gap-3 mt-4">
          <form method="post" style="display:inline-block;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sim, excluir</button>
          </form>
          <a href="{% url 'prestadores_list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
