{% extends 'index.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Registrar Atraso</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="{{ form.nome.id_for_label }}" class="form-label fw-bold">Colaborador</label>
                            {{ form.nome }}
                            <div class="form-text text-danger">{{ form.nome.errors }}</div>
                        </div>

                        <div class="mb-4">
                            <label for="{{ form.data_atraso.id_for_label }}" class="form-label fw-bold">Data do Atraso</label>
                            {{ form.data_atraso }}
                            <div class="form-text text-danger">{{ form.data_atraso.errors }}</div>
                        </div>

                        <div class="mb-4">
                            <label for="{{ form.horario.id_for_label }}" class="form-label fw-bold">Horario do Atraso</label>
                            {{ form.horario }}
                            <div class="form-text text-danger">{{ form.horario.errors }}</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">Salvar Registro</button>
                            <a href="{% url 'atrasos_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
