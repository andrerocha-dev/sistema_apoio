{% extends 'base.html' %}
{% load static %}

{% block title %}Criar Custo Parceiro{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="card-title mb-0">Novo Custo Parceiro</h5>
      <a href="{% url 'custoparceiros-list' %}" class="btn btn-outline-secondary">Voltar</a>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
      {% endif %}

      <div id="form-fields">
        {{ form.as_p }}
      </div>

      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{% url 'custoparceiros-list' %}" class="btn btn-link">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var container = document.getElementById('form-fields');
    if (!container) return;
    var inputs = container.querySelectorAll('input, select, textarea');
    inputs.forEach(function(i){ if (!i.classList.contains('form-control')) i.classList.add('form-control'); });
    var labels = container.querySelectorAll('label'); labels.forEach(function(l){ l.classList.add('form-label'); });
  });
</script>

{% endblock %}
